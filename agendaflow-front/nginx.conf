# =============================================================================
# NGINX — Configuração para React SPA (Single Page Application)
# Arquivo: agendaflow-front/nginx.conf
# =============================================================================

server {
    listen 80;
    server_name _;  # aceita qualquer hostname

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip — reduz o tamanho dos arquivos transferidos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Cache para assets estáticos (JS, CSS, imagens)
    # O Vite gera nomes com hash (main.abc123.js), então o cache longo é seguro
    
    # Proxy para API backend
    location /api/ {
    proxy_pass http://backend:3000/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ⚠️ CRÍTICO para React Router: qualquer rota que não seja um arquivo
    # real deve servir o index.html — o React Router cuida do resto
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
