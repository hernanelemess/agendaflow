# =============================================================================
# DOCKER COMPOSE — Produção
# Comando: docker compose -f docker-compose.prod.yml up -d
#
# Diferenças do desenvolvimento:
# - Sem bind mounts — usa apenas as imagens buildadas
# - Variáveis de ambiente via Docker Secrets ou arquivo .env.prod separado
# - Restart automático em caso de falha
# - MySQL sem porta exposta externamente
# - Nginx como proxy reverso na frente da API
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MySQL — Banco de dados de produção
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: agendaflow_db_prod
    restart: unless-stopped  # reinicia automaticamente, exceto se parado manualmente

    ports:
      - "3092:3306"

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}

    # ⚠️ Em produção, NÃO expõe a porta do banco para o host
    # O banco só é acessível internamente pela rede agendaflow_net
    # ports: (removido intencionalmente)

    volumes:
      - mysql_data_prod:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    # Configurações de performance para produção
    # ⚠️ ADAPTE: ajuste conforme a memória disponível no servidor
    command: >
      --innodb-buffer-pool-size=256M
      --max-connections=100
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2

    networks:
      - agendaflow_net

  # ---------------------------------------------------------------------------
  # API — Back-end Express (imagem buildada, sem hot reload)
  # ---------------------------------------------------------------------------
  api:
    # ⚠️ ADAPTE: substitua pelo nome da sua imagem no registry
    # Exemplo com Docker Hub: image: seuusuario/agendaflow-api:1.0.0
    # Exemplo com GitHub Registry: image: ghcr.io/seuusuario/agendaflow-api:1.0.0
    build:
      context: ./agendaflow-api
      dockerfile: Dockerfile
      target: runtime  # usa o estágio final (sem devDependencies, sem npm)

    image: agendaflow-api:prod
    container_name: agendaflow_api_prod
    restart: unless-stopped

    environment:
      NODE_ENV:    production
      PORT:        3000
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${MYSQL_DATABASE}
      DB_USER:     ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}

    # ⚠️ Em produção, a API não precisa estar acessível diretamente.
    # O Nginx (abaixo) faz o proxy. Remova o ports se usar Nginx.
    # Mantenha apenas se quiser acesso direto à API.
    ports:
      - "3091:3000"

    # Sem bind mounts em produção — usa somente o que está na imagem
    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Limita recursos do container para evitar que um bug consuma tudo
    # ⚠️ ADAPTE: ajuste conforme o tamanho do seu servidor
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M

    networks:
      - agendaflow_net

  # ---------------------------------------------------------------------------
  # Front-end — Nginx servindo os arquivos estáticos do React
  # ---------------------------------------------------------------------------
  front:
    build:
      context: ./agendaflow-front
      dockerfile: Dockerfile
      target: runtime  # imagem final com Nginx

    image: agendaflow-front:prod
    container_name: agendaflow_front_prod
    restart: unless-stopped

    # ⚠️ ADAPTE: se tiver um proxy reverso externo (ex: Traefik, Nginx no host),
    # mude para uma porta interna e configure o proxy para apontar aqui
    ports:
      - "3090:80"

    depends_on:
      - api

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - agendaflow_net

# -----------------------------------------------------------------------------
# Volumes de produção — separados dos volumes de dev para evitar conflitos
# -----------------------------------------------------------------------------
volumes:
  mysql_data_prod:
    driver: local

networks:
  agendaflow_net:
    driver: bridge