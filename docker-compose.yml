# =============================================================================
# DOCKER COMPOSE — Desenvolvimento
# Comando: docker compose up
#
# Diferenças do ambiente de produção:
# - Hot reload via bind mounts (alterações no código refletem imediatamente)
# - Variáveis de ambiente lidas do arquivo .env local
# - MySQL com volume nomeado para persistir dados entre reinicializações
# - Sem build da imagem do front — usa o servidor de dev do Vite
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MySQL — Banco de dados
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: agendaflow_db_dev

    # ⚠️ SEGURANÇA: nunca coloque senhas aqui diretamente.
    # Use o arquivo .env na raiz do projeto (mesmo nível deste arquivo).
    # ⚠️ ADAPTE: crie um arquivo .env com as variáveis abaixo:
    #   MYSQL_ROOT_PASSWORD=sua_senha_root
    #   MYSQL_DATABASE=agendaflow
    #   MYSQL_USER=agendauser
    #   MYSQL_PASSWORD=sua_senha_user
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}

    ports:
      # ⚠️ Em dev, expõe a porta para você acessar com MySQL Workbench
      # Em produção, remova esta linha — o banco não deve ser acessível externamente
      - "3307:3306"

    volumes:
      # Volume nomeado: persiste os dados do banco entre reinicializações
      - mysql_data_dev:/var/lib/mysql
      # Executa o migration automaticamente na primeira inicialização
      # ⚠️ ADAPTE: ajuste o caminho se sua pasta de migrations for diferente
      - ./agendaflow-api/database/migrations:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - agendaflow_net

  # ---------------------------------------------------------------------------
  # API — Back-end Express com hot reload via nodemon
  # ---------------------------------------------------------------------------
  api:
    # Em dev, builda a partir do Dockerfile mas usa volume para hot reload
    build:
      context: ./agendaflow-api
      dockerfile: Dockerfile

    container_name: agendaflow_api_dev
    image: agendaflow-api:dev

    # Sobrescreve o CMD do Dockerfile para usar nodemon em vez de node
    command: ["npx", "nodemon", "src/server.js"]

    # ⚠️ ADAPTE: crie um arquivo .env na raiz com estas variáveis:
    environment:
      NODE_ENV:    development
      PORT:        ${API_PORT:-3000}
      DB_HOST:     db               # nome do serviço MySQL acima
      DB_PORT:     3306
      DB_NAME:     ${MYSQL_DATABASE}
      DB_USER:     ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET:          ${JWT_SECRET}
      JWT_EXPIRES_IN:      ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}

    ports:
      - "${API_PORT:-3000}:3000"

    volumes:
      # Bind mount: qualquer alteração no código local reflete no container
      - ./agendaflow-api/src:/app/src:ro
      # node_modules NÃO é montado — usa o do container (evita conflitos de OS)
      - /app/node_modules

    depends_on:
      db:
        condition: service_healthy  # aguarda o banco estar pronto

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - agendaflow_net

  # ---------------------------------------------------------------------------
  # Front-end — React com servidor de desenvolvimento do Vite
  # ---------------------------------------------------------------------------
  front:
    build:
      context: ./agendaflow-front
      dockerfile: Dockerfile
      target: build   # usa o estágio de build que tem Node + Vite

    container_name: agendaflow_front_dev
    image: agendaflow-front:dev

    # Sobrescreve para rodar o servidor de dev do Vite
    command: ["npx", "vite", "--host", "0.0.0.0"]

    environment:
      # ⚠️ ADAPTE: URL da API acessível pelo navegador (não pelo container)
      VITE_API_URL: http://localhost:${API_PORT:-3000}

    ports:
      - "5173:5173"

    volumes:
      # Bind mount para hot reload do Vite
      - ./agendaflow-front/src:/app/src:ro
      - /app/node_modules

    depends_on:
      - api

    networks:
      - agendaflow_net

# -----------------------------------------------------------------------------
# Volumes nomeados — persistem dados fora do ciclo de vida dos containers
# -----------------------------------------------------------------------------
volumes:
  mysql_data_dev:
    driver: local

# -----------------------------------------------------------------------------
# Rede interna — os serviços se comunicam pelo nome (ex: "db", "api")
# sem expor portas desnecessariamente para o host
# -----------------------------------------------------------------------------
networks:
  agendaflow_net:
    driver: bridge
